
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Painel Admin</title>
<style>
body{background:#111;color:white;font-family:Arial;padding:40px}
.card{background:#222;padding:20px;margin-bottom:20px}
input,textarea{width:100%;margin:5px 0;padding:10px}
button{padding:10px;background:#ff0066;color:white;border:none}
</style>
</head>

<body>

<h1>Painel Conteúdos VIP</h1>

<div class="card">

<input id="title" placeholder="Título">
<textarea id="desc" placeholder="Descrição"></textarea>
<input id="price" placeholder="Preço centavos">
<input id="video" placeholder="Preview video URL">

<button onclick="save()">Salvar</button>

</div>

<div id="list"></div>

<script>

async function load(){

const r=await fetch("/admin/api/products")
const data=await r.json()

const el=document.getElementById("list")
el.innerHTML=""

data.forEach(p=>{

el.innerHTML+=`
<div class="card">
<h3>${p.title}</h3>
<p>${p.description}</p>
<p>R$ ${(p.price_cents/100).toFixed(2)}</p>
</div>
`

})

}

async function save(){

await fetch("/admin/api/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
title:title.value,
description:desc.value,
price_cents:Number(price.value),
preview_video_url:video.value
})
})

load()

}

load()

</script>

</body>
</html>
